<div class="admin-layout">
  <!-- Mobile header -->
  <div class="mobile-header">
    <button class="hamburger" (click)="toggleSidebar()">&#9776;</button>
    <span class="mobile-brand">WinServe <span class="badge">Admin</span></span>
  </div>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" [class.open]="sidebarOpen" (click)="closeSidebar()"></div>

  <nav class="sidebar" [class.open]="sidebarOpen">
    <div class="brand">
      <h2>WinServe</h2>
      <span class="badge">Admin</span>
    </div>
    <ul class="nav-links">
      <li><a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard
      </a></li>
      <li><a routerLink="/dashboard/users" routerLinkActive="active" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> Users
      </a></li>
      <li><a routerLink="/dashboard/activity" routerLinkActive="active" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg> Activity
      </a></li>
      <li><a routerLink="/dashboard/generations" routerLinkActive="active" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15.01V17h1.99l5.88-5.88-1.99-1.99L8 15.01zM17.71 9.04a.996.996 0 000-1.41l-.59-.59a.996.996 0 00-1.41 0l-.97.97 1.99 1.99.98-.96z"/></svg> Generations
      </a></li>
      <li><a routerLink="/dashboard/bulk-uploads" routerLinkActive="active" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg> Bulk Uploads
      </a></li>
      <li><a routerLink="/dashboard/config" routerLinkActive="active" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg> Configuration
      </a></li>
      <li><a routerLink="/dashboard/newsletter" routerLinkActive="active" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg> Newsletter
      </a></li>
      <li><a routerLink="/dashboard/adverts" routerLinkActive="active" (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg> Adverts
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="version-info">WinServe Admin v1.0</div>
      <button class="logout-btn" (click)="logout()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg> Sign Out
      </button>
    </div>
  </nav>

  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <footer class="admin-footer">
    Designed by <a href="https://code-wave.co.za/" target="_blank" rel="noopener">CodeWave</a>
  </footer>
</div>
