<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">W</div>
      <h1>WinServe Admin</h1>
      <p class="subtitle">Administrative Portal</p>
    </div>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="email" placeholder="admin@winserve.co.za"
             autocomplete="username" [disabled]="loading" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [(ngModel)]="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
             autocomplete="current-password" [disabled]="loading" (keyup.enter)="login()" />
    </div>

    <button class="btn-primary" (click)="login()" [disabled]="loading">
      <span *ngIf="!loading">Sign In</span>
      <span *ngIf="loading" class="btn-loading">
        <span class="btn-spinner"></span> Signing in...
      </span>
    </button>
  </div>
</div>
