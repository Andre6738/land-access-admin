<div class="login-container">
  <div class="login-card">
    <h1>WinServe Admin</h1>
    <p class="subtitle">Administrative Portal</p>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="email" placeholder="admin@winserve.co.za" autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [(ngModel)]="password" placeholder="••••••••" autocomplete="current-password"
             (keyup.enter)="login()" />
    </div>

    <button class="btn-primary" (click)="login()">Sign In</button>
  </div>
</div>
